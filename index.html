<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Diyet Takip — Diyetisyen Paneli</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2F6B4F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Diyet Takip">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap');

  :root{
    --bg:#EEF3EE;
    --surface:#FFFFFF;
    --surface-2:#F6F9F5;
    --ink:#16241F;
    --ink-soft:#52635C;
    --line:#DCE6DD;
    --primary:#2F6B4F;
    --primary-dark:#234E3A;
    --primary-soft:#E3EFE6;
    --accent:#E0712F;
    --accent-soft:#FBEBE0;
    --danger:#C0432F;
    --shadow:0 1px 2px rgba(22,36,31,.05),0 8px 24px rgba(22,36,31,.06);
    --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Plus Jakarta Sans',system-ui,sans-serif;
    background:var(--bg);color:var(--ink);
    line-height:1.5;-webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  h1,h2,h3{font-family:'Fraunces',Georgia,serif;font-weight:600;letter-spacing:-.01em;line-height:1.15}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink)}
  .hidden{display:none !important}

  /* ---------- generic ---------- */
  .btn{display:inline-flex;align-items:center;gap:8px;justify-content:center;
    padding:11px 18px;border-radius:11px;font-weight:600;font-size:15px;
    background:var(--primary);color:#fff;transition:.15s;white-space:nowrap}
  .btn:hover{background:var(--primary-dark)}
  .btn:disabled{opacity:.55;cursor:not-allowed}
  .btn.ghost{background:var(--surface-2);color:var(--ink);border:1px solid var(--line)}
  .btn.ghost:hover{background:#EDF2EC}
  .btn.accent{background:var(--accent)}
  .btn.accent:hover{filter:brightness(.94)}
  .btn.sm{padding:7px 12px;font-size:13.5px;border-radius:9px}
  .btn.danger{background:transparent;color:var(--danger);border:1px solid #E8C9C2}
  .btn.danger:hover{background:#FBEEEC}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .field label{font-size:13px;font-weight:600;color:var(--ink-soft)}
  .field input,.field select,.field textarea{
    padding:11px 13px;border:1px solid var(--line);border-radius:11px;background:var(--surface);
    transition:.15s;width:100%}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .row{display:flex;gap:12px}
  .row > *{flex:1}
  .muted{color:var(--ink-soft);font-size:14px}
  .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600}
  .pill.green{background:var(--primary-soft);color:var(--primary-dark)}
  .pill.orange{background:var(--accent-soft);color:var(--accent)}
  .err{color:var(--danger);font-size:13.5px;min-height:18px;font-weight:500}

  /* ---------- login ---------- */
  #login{min-height:100vh;display:grid;place-items:center;padding:24px}
  .login-card{width:100%;max-width:420px;background:var(--surface);border-radius:24px;
    box-shadow:var(--shadow);padding:34px 30px;border:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:11px;margin-bottom:22px}
  .brand .mark{width:42px;height:42px;border-radius:12px;background:var(--primary);
    display:grid;place-items:center;color:#fff;flex:none}
  .brand .mark svg{width:24px;height:24px}
  .brand h1{font-size:21px}
  .brand p{font-size:12.5px;color:var(--ink-soft);font-family:'Plus Jakarta Sans'}
  .tabs{display:flex;background:var(--surface-2);border-radius:12px;padding:4px;margin-bottom:22px;border:1px solid var(--line)}
  .tabs button{flex:1;padding:9px;border-radius:9px;font-weight:600;font-size:14px;color:var(--ink-soft);transition:.15s}
  .tabs button.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.07)}
  .login-foot{margin-top:18px;text-align:center;font-size:13.5px;color:var(--ink-soft)}
  .linkbtn{color:var(--primary);font-weight:600;background:none}

  /* ---------- app shell ---------- */
  #app{min-height:100vh;display:flex;flex-direction:column}
  .topbar{background:var(--surface);border-bottom:1px solid var(--line);
    padding:12px 22px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:30}
  .topbar .mark{width:34px;height:34px;border-radius:10px;background:var(--primary);display:grid;place-items:center;color:#fff;flex:none}
  .topbar .mark svg{width:19px;height:19px}
  .topbar .who{font-weight:700;font-size:15px}
  .topbar .role{font-size:12px;color:var(--ink-soft)}
  .topbar .spacer{flex:1}
  .container{width:100%;max-width:980px;margin:0 auto;padding:26px 22px 80px}

  .section-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .section-head h2{font-size:25px}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card.pad{padding:20px}
  .grid{display:grid;gap:14px}

  /* client list */
  .client-row{display:flex;align-items:center;gap:14px;padding:15px 18px;border-bottom:1px solid var(--line);cursor:pointer;transition:.12s}
  .client-row:last-child{border-bottom:none}
  .client-row:hover{background:var(--surface-2)}
  .avatar{width:42px;height:42px;border-radius:12px;background:var(--primary-soft);color:var(--primary-dark);
    display:grid;place-items:center;font-weight:700;flex:none;font-size:16px}
  .client-row .meta{flex:1;min-width:0}
  .client-row .meta .nm{font-weight:600}
  .client-row .meta .sub{font-size:13px;color:var(--ink-soft)}
  .chev{color:var(--ink-soft);flex:none}

  /* day tabs */
  .daytabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px}
  .daytabs button{padding:8px 13px;border-radius:10px;font-weight:600;font-size:13.5px;
    background:var(--surface);border:1px solid var(--line);color:var(--ink-soft);white-space:nowrap}
  .daytabs button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
  .daytabs button.today{position:relative}
  .daytabs button.today::after{content:'';position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%;background:var(--accent)}

  /* meal editor / view */
  .meal{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
  .meal .mhead{display:flex;gap:10px;align-items:center;margin-bottom:10px}
  .meal .mhead .time{font-weight:700;font-variant-numeric:tabular-nums;background:var(--primary-soft);color:var(--primary-dark);padding:4px 10px;border-radius:8px;font-size:14px}
  .meal-view{display:flex;gap:14px;padding:15px;border:1px solid var(--line);border-radius:14px;margin-bottom:12px;background:var(--surface)}
  .meal-view .clock{flex:none;width:58px;text-align:center}
  .meal-view .clock .t{font-weight:800;font-variant-numeric:tabular-nums;font-size:17px}
  .meal-view .clock .lbl{font-size:11px;color:var(--ink-soft)}
  .meal-view .body{flex:1;border-left:2px solid var(--primary-soft);padding-left:14px}
  .meal-view .body .nm{font-weight:700;margin-bottom:3px}
  .meal-view .body .ic{white-space:pre-wrap;color:var(--ink-soft);font-size:14.5px}
  .meal-view.soon{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .meal-view.soon .body{border-color:var(--accent)}
  .meal-view.done{background:var(--primary-soft);border-color:#bcd9c6}
  .meal-view.done .body{border-color:var(--primary)}
  .ogun-btn{margin-top:10px;padding:6px 13px;border:1px solid var(--line);border-radius:999px;font-size:13px;font-weight:600;color:var(--ink-soft);background:var(--surface);transition:.12s}
  .ogun-btn:hover{border-color:var(--primary)}
  .ogun-btn.on{background:var(--primary);color:#fff;border-color:var(--primary)}

  /* chat */
  .chat{display:flex;flex-direction:column;height:62vh;min-height:380px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
  .bubble{max-width:78%;padding:9px 13px;border-radius:15px;font-size:14.5px;line-height:1.45;word-wrap:break-word;white-space:pre-wrap}
  .bubble .meta{font-size:10.5px;opacity:.65;margin-top:4px}
  .bubble.ben{align-self:flex-end;background:var(--primary);color:#fff;border-bottom-right-radius:5px}
  .bubble.karsi{align-self:flex-start;background:var(--surface-2);border:1px solid var(--line);border-bottom-left-radius:5px}
  .chat-input{display:flex;gap:8px;padding:11px;border-top:1px solid var(--line);background:var(--surface)}
  .chat-input input{flex:1;padding:11px 14px;border:1px solid var(--line);border-radius:999px}
  .chat-empty{margin:auto;text-align:center;color:var(--ink-soft);font-size:14px;padding:30px}

  /* floating chat widget */
  #chatWidget{position:fixed;right:20px;bottom:20px;z-index:85}
  #chatFab{width:58px;height:58px;border-radius:50%;background:var(--primary);color:#fff;box-shadow:0 8px 24px rgba(22,36,31,.22);display:grid;place-items:center;position:relative;transition:.15s}
  #chatFab:hover{background:var(--primary-dark)}
  #chatFab svg{width:26px;height:26px}
  #chatBadge{position:absolute;top:-3px;right:-3px;min-width:21px;height:21px;padding:0 6px;border-radius:999px;background:var(--accent);color:#fff;font-size:12px;font-weight:700;display:grid;place-items:center;border:2px solid var(--bg)}
  #chatPanel{position:absolute;right:0;bottom:72px;width:344px;max-width:calc(100vw - 40px);height:484px;max-height:calc(100vh - 130px);background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.25);display:flex;flex-direction:column;overflow:hidden}
  .chat-head{padding:12px 14px;display:flex;align-items:center;gap:8px;background:var(--primary);color:#fff;flex:none}
  .chat-head .ttl{font-weight:700;flex:1;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chat-head button{color:#fff;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-size:18px;line-height:1}
  .chat-head button:hover{background:rgba(255,255,255,.18)}
  .chat-head button svg{width:18px;height:18px}
  .conv{display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:1px solid var(--line);cursor:pointer;transition:.12s}
  .conv:hover{background:var(--surface-2)}
  .conv .nm{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .conv .last{font-size:12.5px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .conv.unread .last{color:var(--ink);font-weight:600}
  .conv .ub{margin-left:auto;flex:none;background:var(--accent);color:#fff;min-width:21px;height:21px;border-radius:999px;font-size:11px;font-weight:700;display:grid;place-items:center;padding:0 6px}
  @media(max-width:560px){
    #chatWidget{right:14px;bottom:14px}
    #chatPanel{width:calc(100vw - 28px);height:70vh}
  }

  .empty{text-align:center;padding:46px 20px;color:var(--ink-soft)}
  .empty svg{width:42px;height:42px;opacity:.5;margin-bottom:10px}

  /* stats */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:18px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px}
  .stat .v{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;font-family:'Fraunces'}
  .stat .k{font-size:12.5px;color:var(--ink-soft);margin-top:2px}
  .stat .v small{font-size:14px;font-weight:600;color:var(--ink-soft)}

  /* weight log */
  .wlog{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--line)}
  .wlog:last-child{border-bottom:none}
  .wlog .d{font-size:13px;color:var(--ink-soft);width:96px;flex:none}
  .wlog .kg{font-weight:700;font-variant-numeric:tabular-nums}
  .wlog .delta{font-size:12.5px;font-weight:600;margin-left:auto}
  .down{color:var(--primary)}.up{color:var(--accent)}

  /* tabbar (client) */
  .subtabs{display:flex;gap:7px;margin-bottom:20px;flex-wrap:wrap}
  .subtabs button{padding:9px 15px;border-radius:11px;font-weight:600;font-size:14px;background:var(--surface);border:1px solid var(--line);color:var(--ink-soft)}
  .subtabs button.active{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(22,36,31,.45);backdrop-filter:blur(2px);
    display:grid;place-items:center;padding:20px;z-index:60}
  .modal{background:var(--surface);border-radius:20px;width:100%;max-width:460px;padding:26px;box-shadow:0 20px 60px rgba(0,0,0,.25);max-height:90vh;overflow:auto}
  .modal h3{font-size:21px;margin-bottom:4px}
  .modal .sub{color:var(--ink-soft);font-size:14px;margin-bottom:18px}
  .modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}

  /* toast */
  #toasts{position:fixed;top:16px;right:16px;z-index:90;display:flex;flex-direction:column;gap:10px;max-width:340px}
  .toast{background:var(--ink);color:#fff;padding:13px 16px;border-radius:13px;box-shadow:0 10px 30px rgba(0,0,0,.3);
    display:flex;gap:11px;align-items:flex-start;animation:slidein .25s ease}
  .toast.meal{background:var(--accent)}
  .toast .tt{font-weight:700;font-size:14px}
  .toast .tb{font-size:13px;opacity:.92}
  @keyframes slidein{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}

  /* chart */
  .chart-wrap{position:relative}
  svg.chart{width:100%;height:200px;display:block}

  .notice{background:var(--accent-soft);border:1px solid #F0CFB6;color:#8a4216;
    padding:13px 15px;border-radius:13px;font-size:13.5px;display:flex;gap:10px;align-items:flex-start;margin-bottom:18px}
  .notice svg{flex:none;width:18px;height:18px;margin-top:1px}

  @media(max-width:560px){
    .container{padding:18px 14px 80px}
    .row{flex-direction:column;gap:0}
    .section-head h2{font-size:21px}
  }
  @media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important}}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <!-- genel giriş (danışan + diyetisyen) -->
  <div class="login-card" id="loginPublic">
    <div class="brand">
      <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6"/></svg></div>
      <div>
        <h1>Diyet Takip</h1>
        <p>Diyetisyen & danışan platformu</p>
      </div>
    </div>

    <div class="tabs">
      <button id="tabDanisan" class="active" onclick="setLoginTab('danisan')">Danışan</button>
      <button id="tabDiyetisyen" onclick="setLoginTab('diyetisyen')">Diyetisyen</button>
    </div>

    <div class="field">
      <label>Kullanıcı adı</label>
      <input id="loginUser" autocomplete="username" placeholder="kullanıcı adınız">
    </div>
    <div class="field">
      <label>Şifre</label>
      <input id="loginPass" type="password" autocomplete="current-password" placeholder="••••••••">
    </div>

    <div class="err" id="loginErr"></div>
    <button class="btn" id="loginBtn" style="width:100%;margin-top:6px" onclick="handleLogin()">Giriş yap</button>
  </div>

  <!-- gizli admin girişi (#admin ile açılır) -->
  <div class="login-card hidden" id="loginAdmin">
    <div class="brand">
      <div class="mark" style="background:var(--ink)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/></svg></div>
      <div>
        <h1>Admin Paneli</h1>
        <p>Yönetici girişi</p>
      </div>
    </div>
    <div class="field">
      <label>Kullanıcı adı</label>
      <input id="adminUser" autocomplete="username" placeholder="admin kullanıcı adı">
    </div>
    <div class="field">
      <label>Şifre</label>
      <input id="adminPass" type="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <div class="err" id="adminErr"></div>
    <button class="btn" id="adminBtn" style="width:100%;margin-top:6px;background:var(--ink)" onclick="handleAdminLogin()">Giriş yap</button>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <div class="topbar">
    <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6"/></svg></div>
    <div>
      <div class="who" id="topWho">—</div>
      <div class="role" id="topRole">—</div>
    </div>
    <div class="spacer"></div>
    <button class="btn ghost sm" onclick="logout()">Çıkış</button>
  </div>
  <div class="container" id="view"></div>
</div>

<!-- yüzen mesaj balonu (Messenger tarzı) -->
<div id="chatWidget" class="hidden">
  <div id="chatPanel" class="hidden"></div>
  <button id="chatFab" onclick="chatToggle()" aria-label="Mesajlar">
    <svg id="chatFabIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5Z"/></svg>
    <span id="chatBadge" class="hidden">0</span>
  </button>
</div>

<div id="modalRoot"></div>
<div id="toasts"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, addDoc, deleteDoc, query, where, orderBy, onSnapshot, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

/* =====================================================================
   1) AYARLAR  —  BURAYI DOLDUR
   Firebase konsolundan kendi projenin config'ini yapıştır.
   ===================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyAFZy4qux7iE3zT2sAPU7tYaz3FbEMG5Eg",
  authDomain: "diyet-takip-46b5e.firebaseapp.com",
  projectId: "diyet-takip-46b5e",
  storageBucket: "diyet-takip-46b5e.firebasestorage.app",
  messagingSenderId: "992309349104",
  appId: "1:992309349104:web:30826c08c8eb6dffac1035"
};
const BILDIRIM_DK = 15;   // öğüne kaç dakika kala uyarı verilsin
const EPOSTA_SONEKI = "@diyet.local"; // kullanıcı adı -> sahte e-posta dönüşümü
// FCM push (arka plan bildirimi) — yalnızca https'te (Vercel) çalışır
const VAPID_KEY = "BGG2-fJNF7kP4opttfoaAk2aEojyQCt_g5WJvIQ2_6W-SFFyQO_KB7c-AVsYVBzujFOtcJltgBOebD7vTGPi0QA"; // Firebase Console > Cloud Messaging > Web Push certificates
const PUSH_API  = "/api/push";        // mesaj bildirimi gönderen Vercel fonksiyonu

/* ===================================================================== */

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
// danışan hesabı oluştururken diyetisyenin oturumunu düşürmemek için ikincil app
const secondaryApp = initializeApp(firebaseConfig, "ikincil");
const secondaryAuth = getAuth(secondaryApp);

const GUNLER = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
const HAFTA = ['Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi','Pazar'];

let state = { uid:null, profil:null, loginTab:'danisan' };

/* ---------- yardımcılar ---------- */
const $ = id => document.getElementById(id);
const esc = s => String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const userToEmail = u => u.trim().toLowerCase().replace(/\s+/g,'') + EPOSTA_SONEKI;
const bugunGun = () => GUNLER[new Date().getDay()];
const bugunISO = () => new Date().toISOString().slice(0,10);
function nowMin(){ const d=new Date(); return d.getHours()*60+d.getMinutes(); }
function saatToMin(s){ const m=/^(\d{1,2}):(\d{2})$/.exec(s||''); return m? (+m[1])*60+(+m[2]) : null; }
function trTarih(iso){ try{return new Date(iso+'T00:00').toLocaleDateString('tr-TR',{day:'numeric',month:'short'});}catch{return iso;} }
function initialler(ad){ return (ad||'?').trim().split(/\s+/).slice(0,2).map(x=>x[0]||'').join('').toUpperCase(); }

function toast(title, body, kind){
  const el=document.createElement('div');
  el.className='toast'+(kind?' '+kind:'');
  el.innerHTML=`<div><div class="tt">${esc(title)}</div>${body?`<div class="tb">${esc(body)}</div>`:''}</div>`;
  $('toasts').appendChild(el);
  setTimeout(()=>el.remove(), kind==='meal'?9000:4000);
}
function authHata(e){
  const c=(e&&e.code)||'';
  if(c.includes('invalid-credential')||c.includes('wrong-password')||c.includes('user-not-found')) return 'Kullanıcı adı veya şifre hatalı.';
  if(c.includes('email-already-in-use')) return 'Bu kullanıcı adı zaten kayıtlı.';
  if(c.includes('weak-password')) return 'Şifre en az 6 karakter olmalı.';
  if(c.includes('network')) return 'Bağlantı hatası. İnternetini kontrol et.';
  if(c.includes('configuration-not-found')||c.includes('api-key')) return 'Firebase ayarları eksik. Dosyadaki firebaseConfig kısmını doldur.';
  return (e&&e.message)||'Bir hata oluştu.';
}

onAuthStateChanged(auth, async (user)=>{
  if(!user){ state.uid=null; state.profil=null; showLogin(); return; }
  state.uid=user.uid;
  try{
    const snap=await getDoc(doc(db,'kullanicilar',user.uid));
    if(!snap.exists()){
      await signOut(auth);
      showLogin();
      loginMesaj('Giriş başarılı ama bu kullanıcı için profil kaydı yok. Firestore → kullanicilar altında, Document ID olarak bu kullanıcının UID\'i ile bir belge oluştur (rol, kullaniciAdi, adSoyad).');
      return;
    }
    state.profil={ id:user.uid, ...snap.data() };
    showApp();
  }catch(e){
    try{ await signOut(auth); }catch(_){}
    showLogin();
    const c=(e&&e.code)||(e&&e.message)||'hata';
    loginMesaj('Profil okunamadı ('+c+'). Firestore kurallarını Publish ettin mi?');
  }
});
function loginMesaj(msg){
  setTimeout(()=>{
    const el = location.hash.toLowerCase()==='#admin' ? $('adminErr') : $('loginErr');
    if(el) el.textContent=msg;
  },60);
}

function showLogin(){
  stopReminders();
  chatDur();
  $('app').classList.add('hidden');
  $('login').classList.remove('hidden');
  // #admin varsa admin giriş kartını göster, yoksa normal
  const adminMode = location.hash.toLowerCase()==='#admin';
  $('loginPublic').classList.toggle('hidden', adminMode);
  $('loginAdmin').classList.toggle('hidden', !adminMode);
  ['loginUser','loginPass','adminUser','adminPass'].forEach(id=>{ if($(id))$(id).value=''; });
}
function showApp(){
  $('login').classList.add('hidden');
  $('app').classList.remove('hidden');
  $('topWho').textContent=state.profil.adSoyad||state.profil.kullaniciAdi;
  const r=state.profil.rol;
  $('topRole').textContent = r==='admin'?'Admin' : r==='diyetisyen'?'Diyetisyen':'Danışan';
  chatDur(); // admin için gizli kalır
  if(r==='admin') renderAdmin();
  else if(r==='diyetisyen'){ renderDiyetisyen(); chatBaslat('diyetisyen'); pushBaslat(); }
  else { renderDanisan(); startReminders(); chatBaslat('danisan'); pushBaslat(); }
}

/* ---------- CSV içe aktarma ---------- */
function fold(s){
  return String(s||'').trim().replace(/ı/g,'i').replace(/İ/g,'I')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
}
function gunBul(raw){
  const t={ 'pazartesi':'Pazartesi','pzt':'Pazartesi','pt':'Pazartesi',
    'sali':'Salı','sal':'Salı','sl':'Salı',
    'carsamba':'Çarşamba','car':'Çarşamba','crs':'Çarşamba','crş':'Çarşamba',
    'persembe':'Perşembe','per':'Perşembe','prş':'Perşembe',
    'cuma':'Cuma','cum':'Cuma',
    'cumartesi':'Cumartesi','cmt':'Cumartesi','cts':'Cumartesi',
    'pazar':'Pazar','paz':'Pazar','pz':'Pazar' };
  return t[fold(raw)]||null;
}
function parseCSV(text){
  text=text.replace(/^\uFEFF/,'');
  const firstLine=text.split(/\r?\n/)[0]||'';
  const delim=(firstLine.split(';').length>firstLine.split(',').length)?';':',';
  const rows=[]; let row=[],cur='',inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){ cur+='"'; i++; } else inQ=false; }
      else cur+=c;
    }else{
      if(c==='"') inQ=true;
      else if(c===delim){ row.push(cur); cur=''; }
      else if(c==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; }
      else if(c==='\r'){/* yoksay */}
      else cur+=c;
    }
  }
  if(cur!==''||row.length){ row.push(cur); rows.push(row); }
  return rows.filter(r=>r.some(c=>(c||'').trim()!==''));
}
function csvCozumle(text){
  const rows=parseCSV(text);
  if(!rows.length) return {hata:'Dosya boş görünüyor.'};
  let start=0;
  if(!gunBul(rows[0][0]) && /gun|saat|ogun|icerik/.test(fold(rows[0].join(' ')))) start=1;
  const gunler={}; let say=0; const atlanan=[];
  for(let i=start;i<rows.length;i++){
    const r=rows[i];
    const gun=gunBul(r[0]);
    if(!gun){ if((r[0]||'').trim()) atlanan.push(r[0].trim()); continue; }
    const saat=(r[1]||'').trim(), ad=(r[2]||'').trim(), icerik=(r[3]||'').trim();
    if(!saat&&!ad&&!icerik) continue;
    (gunler[gun]=gunler[gun]||[]).push({ad,saat,icerik}); say++;
  }
  return {gunler,say,atlanan,gunSayisi:Object.keys(gunler).length};
}
let pendingCSV=null;
window.csvDosyaSec=function(e){
  const f=e.target.files&&e.target.files[0]; if(!f) return;
  const rdr=new FileReader();
  rdr.onload=()=>{ csvIslem(rdr.result); e.target.value=''; };
  rdr.onerror=()=>{ toast('Hata','Dosya okunamadı.'); e.target.value=''; };
  rdr.readAsText(f,'UTF-8');
};
function csvIslem(text){
  const res=csvCozumle(text);
  if(res.hata){ toast('Hata',res.hata); return; }
  if(!res.say){ toast('Aktarılamadı','Geçerli satır bulunamadı. İlk sütundaki gün adlarını kontrol et.'); return; }
  pendingCSV=res;
  const benzersizAtlanan=[...new Set(res.atlanan)];
  modal(`<h3>CSV içe aktar</h3>
    <div class="sub">${res.say} öğün, ${res.gunSayisi} gün bulundu: ${esc(Object.keys(res.gunler).join(', '))}.</div>
    <div class="notice"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01"/><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/></svg>
      <div>Yukarıdaki günlerin mevcut planı CSV ile <b>değiştirilecek</b>. CSV'de olmayan günler korunur.</div></div>
    ${benzersizAtlanan.length?`<div class="muted" style="margin-bottom:14px">Tanınmayan gün adı olan ${res.atlanan.length} satır atlandı: ${esc(benzersizAtlanan.slice(0,6).join(', '))}${benzersizAtlanan.length>6?'…':''}</div>`:''}
    <div class="modal-foot"><button class="btn ghost" onclick="closeModal()">Vazgeç</button>
    <button class="btn" onclick="csvUygula()">İçe aktar</button></div>`);
}

const SU_KAPLAR = [
  { ad:'Bardak', ml:250 },
  { ad:'Pet şişe', ml:500 },
  { ad:'Büyük şişe', ml:1000 }
];
let suMl=0, suHedefMl=2000, suGecmisCache=[], suStack=[];
function suDocMl(d){ return (d.ml!=null) ? d.ml : (d.bardak? d.bardak*250 : 0); } // eski "bardak" kayıtlarıyla uyum
async function renderSu(){
  const box=$('cBody');
  box.innerHTML=`<div class="empty">Yükleniyor…</div>`;

function kisaGun(iso){ try{const d=new Date(iso+'T00:00'); return GUNLER[d.getDay()].slice(0,3);}catch{return (iso||'').slice(5);} }
function suHTML(){
  const ml=suMl, hedef=suHedefMl, gecmis=suGecmisCache;
  const pct=Math.min(1, hedef? ml/hedef : 0);
  const r=70, c=2*Math.PI*r, off=c*(1-pct);
  const litre=(ml/1000).toFixed(2), hedefL=(hedef/1000).toFixed(2);

  const maxBar=Math.max(hedef, ...gecmis.map(g=>g.ml), 1);
  const SU='#3B9ED9';
  return `
  <div class="section-head"><h2>Su takibi</h2><span class="pill green">%${yuzde}</span></div>
  <div class="card pad" style="text-align:center">
    <div style="position:relative;width:180px;height:180px;margin:0 auto 12px">
      <svg width="180" height="180" viewBox="0 0 180 180" style="transform:rotate(-90deg)">
        <circle cx="90" cy="90" r="${r}" fill="none" stroke="var(--primary-soft)" stroke-width="14"/>
        <circle cx="90" cy="90" r="${r}" fill="none" stroke="${SU}" stroke-width="14" stroke-linecap="round"
          stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" style="transition:stroke-dashoffset .4s"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <div style="font-family:'Fraunces';font-size:34px;font-weight:600;line-height:1;color:${SU}">${litre} L</div>
        <div class="muted" style="font-size:13px">/ ${hedefL} L</div>
      </div>
    </div>
    <div class="muted" style="font-size:13px;margin-bottom:10px">Ne kadar içtin?</div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px">
      ${SU_KAPLAR.map(k=>`<button class="btn ghost" style="flex-direction:column;gap:2px;min-width:96px;padding:12px 14px" onclick="suEkleMl(${k.ml})">
        <span style="font-weight:700">${k.ad}</span><span class="muted" style="font-size:12px">+${k.ml} ml</span></button>`).join('')}
    </div>
    <div style="display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap">
      <input id="suOzel" type="number" inputmode="numeric" placeholder="özel ml" style="width:104px;padding:9px 11px;border:1px solid var(--line);border-radius:10px">
      <button class="btn ghost sm" onclick="suEkleOzel()">Ekle</button>
      <button class="btn ghost sm" onclick="suGeriAl()">↶ Geri al</button>
      <button class="btn ghost sm" onclick="suSifirla()">Sıfırla</button>
    </div>
  </div>

  <div class="card pad" style="margin-top:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
    <div><h3 style="font-size:16px">Günlük hedef</h3><div class="muted" style="font-size:13px">0,25 L adımlarla</div></div>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="btn ghost sm" onclick="suHedefDegistir(-250)">−</button>
      <b style="min-width:72px;text-align:center">${hedefL} L</b>
      <button class="btn ghost sm" onclick="suHedefDegistir(250)">+</button>
    </div>
  </div>

  ${gecmis.length?`<div class="card pad" style="margin-top:14px">
    <h3 style="font-size:16px;margin-bottom:16px">Son ${gecmis.length} gün</h3>
    <div style="display:flex;align-items:flex-end;gap:10px;height:130px">
      ${gecmis.map(g=>{
        const h=Math.round((g.ml/maxBar)*88)+4;
        const ok=g.ml>=hedef && hedef>0;
        return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;justify-content:flex-end">
          <div style="font-size:11.5px;font-weight:700;color:var(--ink-soft)">${(g.ml/1000).toFixed(1)}</div>
          <div style="width:100%;max-width:36px;height:${h}px;border-radius:8px 8px 4px 4px;background:${ok?SU:'var(--primary-soft)'}"></div>
          <div style="font-size:11px;color:var(--ink-soft)">${kisaGun(g.tarih)}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="muted" style="font-size:11.5px;text-align:right;margin-top:6px">litre / gün</div>
  </div>`:''}`;
}
function suGecmisGuncelle(){
  const iso=bugunISO();
  const idx=suGecmisCache.findIndex(g=>g.tarih===iso);
  if(idx>=0) suGecmisCache[idx].ml=suMl; else suGecmisCache.push({tarih:iso,ml:suMl});
  suGecmisCache=suGecmisCache.sort((a,b)=>a.tarih<b.tarih?-1:1).slice(-7);
}
async function suYaz(){
  try{ await setDoc(doc(db,'kullanicilar',danisanProfil.id,'su',bugunISO()),{ml:suMl,guncelleme:Date.now()},{merge:true}); }
  catch(e){ toast('Hata',authHata(e)); }
}
window.suEkleMl=async function(ml){
  if(!ml||ml<=0) return;
  suMl=Math.max(0, suMl+ml); suStack.push(ml);
  suGecmisGuncelle(); $('cBody').innerHTML=suHTML(); await suYaz();
};
window.suEkleOzel=function(){
  const v=parseInt(($('suOzel')||{}).value,10);
  if(!v||v<=0){ toast('Geçersiz','ml olarak bir sayı gir (örn. 300).'); return; }
  $('suOzel').value=''; suEkleMl(v);
};
window.suGeriAl=async function(){
  if(suMl<=0) return;
  const son = suStack.length ? suStack.pop() : 250;
  suMl=Math.max(0, suMl-son);
  suGecmisGuncelle(); $('cBody').innerHTML=suHTML(); await suYaz();
};
window.suSifirla=async function(){
  if(!suMl) return;
  suMl=0; suStack=[];
  suGecmisGuncelle(); $('cBody').innerHTML=suHTML(); await suYaz();
};
window.suHedefDegistir=async function(delta){
  const yeni=Math.min(5000, Math.max(500, suHedefMl+delta));
  if(yeni===suHedefMl) return;
  suHedefMl=yeni; danisanProfil.suHedefMl=yeni; if(state.profil)state.profil.suHedefMl=yeni;
  $('cBody').innerHTML=suHTML();
  try{ await updateDoc(doc(db,'kullanicilar',danisanProfil.id),{suHedefMl:yeni}); }
  catch(e){ toast('Hata',authHata(e)); }
};
const METRIKLER=[{key:'kilo',ad:'Kilo',unit:'kg'},{key:'bel',ad:'Bel',unit:'cm'},{key:'kalca',ad:'Kalça',unit:'cm'},{key:'kol',ad:'Kol',unit:'cm'}];
let kiloMetrik='kilo', kiloKayitlarCache=[], kiloHedefCache=null;
function metrikSay(kayitlar,key){ return kayitlar.filter(k=>typeof k[key]==='number'&&!isNaN(k[key])).length; }
async function renderKiloGorunum(profil, saltOkunur){
  const box = saltOkunur ? $('ddBody') : $('cBody');
  box.innerHTML=`<div class="empty">Yükleniyor…</div>`;
  const snap=await getDocs(collection(db,'kullanicilar',profil.id,'kilolar'));
  let kayitlar=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.tarih<b.tarih?-1:1);
  kiloKayitlarCache=kayitlar; kiloHedefCache=profil.hedefKilo; kiloMetrik='kilo';

  const son=kayitlar[kayitlar.length-1], ilk=kayitlar[0];
  const hedef=profil.hedefKilo, boy=profil.boy;
  let bmi=null; if(son&&boy){ const m=boy/100; bmi=(son.kilo/(m*m)).toFixed(1); }
  const degisim = (son&&ilk)?(son.kilo-ilk.kilo):null;
  const sonDeger=key=>{ for(let i=kayitlar.length-1;i>=0;i--){ if(typeof kayitlar[i][key]==='number') return kayitlar[i][key]; } return null; };

/* basit SVG çizgi grafik (herhangi bir metrik) */
function cizChart(kayitlar, key, unit, hedef){
  const W=600,H=200,pad=34;
  const vals=kayitlar.map(k=>k[key]);
  let min=Math.min(...vals), max=Math.max(...vals);
  if(hedef!=null){ min=Math.min(min,hedef); max=Math.max(max,hedef); }
  if(min===max){ min-=1; max+=1; }
  const rng=max-min;
  const x=i=>pad+(kayitlar.length===1?0:i*(W-2*pad)/(kayitlar.length-1));
  const y=v=>H-pad-((v-min)/rng)*(H-2*pad);
  const pts=kayitlar.map((k,i)=>`${x(i)},${y(k[key])}`).join(' ');
  const area=`${pad},${H-pad} ${pts} ${x(kayitlar.length-1)},${H-pad}`;
  let hedefLine='';
  if(hedef!=null) hedefLine=`<line x1="${pad}" y1="${y(hedef)}" x2="${W-pad}" y2="${y(hedef)}" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="5 4"/><text x="${W-pad}" y="${y(hedef)-5}" text-anchor="end" font-size="11" fill="var(--accent)">hedef ${hedef}</text>`;
  const dots=kayitlar.map((k,i)=>`<circle cx="${x(i)}" cy="${y(k[key])}" r="3.5" fill="var(--primary)"/>`).join('');
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <polygon points="${area}" fill="var(--primary-soft)" opacity="0.6"/>
    <polyline points="${pts}" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${hedefLine}${dots}
    <text x="${pad}" y="14" font-size="11" fill="var(--ink-soft)">${max.toFixed(1)} ${unit}</text>
    <text x="${pad}" y="${H-pad+16}" font-size="11" fill="var(--ink-soft)">${min.toFixed(1)} ${unit}</text>
  </svg>`;
}

async function renderUyum(profil){
  const box=$('ddBody');
  box.innerHTML=`<div class="empty">Yükleniyor…</div>`;
  let docs=[];
  try{
    const snap=await getDocs(collection(db,'kullanicilar',profil.id,'ogun'));
    docs=snap.docs.map(d=>({tarih:d.id,...d.data()})).sort((a,b)=>a.tarih<b.tarih?-1:1).slice(-14);
  }catch(e){ box.innerHTML=`<div class="empty">Veri okunamadı (${(e&&e.code)||'hata'}).</div>`; return; }
  if(!docs.length){ box.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg><div>Henüz öğün işareti yok.<br>Danışan “Yaptım” dedikçe burada görünür.</div></div>`; return; }
  const gunVeri=docs.map(d=>{ const toplam=d.toplam||0, yap=(d.yapilan||[]).length;
    return {tarih:d.tarih, yapilan:yap, toplam, oran: toplam? Math.round((yap/toplam)*100):0}; });
  const toplamY=gunVeri.reduce((s,g)=>s+g.yapilan,0);
  const toplamT=gunVeri.reduce((s,g)=>s+g.toplam,0);
  const ortalama= toplamT? Math.round((toplamY/toplamT)*100):0;
  const tamGun=gunVeri.filter(g=>g.toplam>0&&g.oran>=100).length;
  box.innerHTML=`
    <div class="stats">
      <div class="stat"><div class="v">%${ortalama}</div><div class="k">Ortalama uyum (${gunVeri.length} gün)</div></div>
      <div class="stat"><div class="v">${toplamY}<small> / ${toplamT}</small></div><div class="k">Yapılan öğün</div></div>
      <div class="stat"><div class="v">${tamGun}</div><div class="k">Tam gün</div></div>
    </div>
    <div class="card pad">
      <h3 style="font-size:16px;margin-bottom:14px">Günlük uyum</h3>
      ${gunVeri.slice().reverse().map(g=>`
        <div style="display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line)">
          <div style="width:88px;font-size:13px;color:var(--ink-soft)">${trTarih(g.tarih)}</div>
          <div style="flex:1;height:10px;background:var(--surface-2);border-radius:999px;overflow:hidden">
            <div style="height:100%;width:${g.oran}%;background:${g.oran>=100?'var(--primary)':g.oran>=50?'#7BB89A':'var(--accent)'};transition:width .3s"></div>
          </div>
          <div style="width:96px;text-align:right;font-size:13px;font-weight:600">${g.yapilan}/${g.toplam} · %${g.oran}</div>
        </div>`).join('')}
    </div>`;
}

/* =====================================================================
   MESAJLAŞMA — yüzen balon (danışan ↔ diyetisyen), canlı + bildirim
   ===================================================================== */
let chatRol=null, chatAcik=false, chatGorunum='liste', chatAktifUid=null;
let sohbetler={}; // uid -> { ad, mesajlar:[], okundu, ilk, unsub }

async function chatBaslat(rol){
  chatDur();
  chatRol=rol;
  $('chatWidget').classList.remove('hidden');
  sohbetler={};
  if(rol==='danisan'){
    sohbetler[state.uid]={ ad:'Diyetisyenim', okundu:(state.profil.okumaDanisan||0), mesajlar:[], ilk:true, unsub:null };
    chatDinle(state.uid);
  } else if(rol==='diyetisyen'){
    try{
      const snap=await getDocs(query(collection(db,'kullanicilar'), where('olusturan','==',state.uid)));
      snap.docs.forEach(d=>{ const c=d.data();
        sohbetler[d.id]={ ad:(c.adSoyad||c.kullaniciAdi||'Danışan'), okundu:(c.okumaDiyetisyen||0), mesajlar:[], ilk:true, unsub:null };
        chatDinle(d.id);
      });
    }catch(e){}
  }
  chatBadgeGuncelle();
}
function chatDur(){
  Object.values(sohbetler).forEach(s=>{ if(s.unsub){ try{s.unsub();}catch(e){} } });
  sohbetler={}; chatRol=null; chatAcik=false; chatGorunum='liste'; chatAktifUid=null;
  const w=$('chatWidget'); if(w) w.classList.add('hidden');
  const p=$('chatPanel'); if(p){ p.classList.add('hidden'); p.innerHTML=''; }
}
function chatDinle(uid){
  const q=query(collection(db,'kullanicilar',uid,'mesajlar'), orderBy('olusturulma','asc'));
  sohbetler[uid].unsub=onSnapshot(q, snap=>{
    const s=sohbetler[uid]; if(!s) return;
    s.mesajlar=snap.docs.map(d=>d.data());
    if(!s.ilk){
      snap.docChanges().forEach(ch=>{
        if(ch.type==='added'){
          const m=ch.doc.data();
          const acikBu = chatAcik && chatGorunum==='thread' && chatAktifUid===uid;
          if(m.gonderen!==chatRol && !acikBu) mesajBildir(uid,m);
        }
      });
    }
    s.ilk=false;
    if(chatAcik && chatGorunum==='thread' && chatAktifUid===uid){ chatThreadCiz(); chatOkunduYap(uid); }
    else if(chatAcik && chatGorunum==='liste'){ chatListeCiz(); }
    chatBadgeGuncelle();
  }, err=>{});
}
function okunmamis(uid){
  const s=sohbetler[uid]; if(!s) return 0;
  return s.mesajlar.filter(m=>m.gonderen!==chatRol && (m.olusturulma||0)>(s.okundu||0)).length;
}
function chatBadgeGuncelle(){
  let t=0; Object.keys(sohbetler).forEach(uid=>t+=okunmamis(uid));
  const b=$('chatBadge'); if(!b) return;
  if(t>0){ b.textContent=t>99?'99+':t; b.classList.remove('hidden'); }
  else b.classList.add('hidden');
}
function mesajBildir(uid,m){
  const ad = chatRol==='diyetisyen' ? ((sohbetler[uid]&&sohbetler[uid].ad)||'Danışan') : 'Diyetisyen';
  toast('Yeni mesaj · '+ad, m.metin);
  if(('Notification' in window) && Notification.permission==='granted'){
    try{ new Notification('Yeni mesaj · '+ad, {body:m.metin, tag:'msg-'+uid}); }catch(e){}
  }
}
window.chatToggle=function(){
  chatAcik=!chatAcik;
  $('chatPanel').classList.toggle('hidden',!chatAcik);
  if(chatAcik){
    if(('Notification' in window) && Notification.permission==='default') Notification.requestPermission().catch(()=>{});
    if(chatRol==='danisan'){ chatGorunum='thread'; chatAktifUid=state.uid; }
    else { chatGorunum='liste'; chatAktifUid=null; }
    chatPanelCiz();
  }
};
window.chatAc=function(uid){ chatGorunum='thread'; chatAktifUid=uid; chatPanelCiz(); chatOkunduYap(uid); };
window.chatListeyeDon=function(){ chatGorunum='liste'; chatAktifUid=null; chatPanelCiz(); };
function notifBtnHTML(){
  if(!('Notification' in window) || Notification.permission==='granted') return '';
  return `<button onclick="chatBildirimIste()" title="Bildirimleri aç"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg></button>`;
}
window.chatBildirimIste=async function(){
  if(!('Notification' in window)) return;
  await Notification.requestPermission().catch(()=>{});
  chatPanelCiz();
};
function chatPanelCiz(){
  const panel=$('chatPanel'); if(!panel) return;
  if(chatGorunum==='liste'){
    panel.innerHTML=`
      <div class="chat-head"><div class="ttl">Mesajlar</div>${notifBtnHTML()}<button onclick="chatToggle()" title="Kapat">×</button></div>
      <div class="chat-msgs" id="chatList" style="padding:0;gap:0"></div>`;
    chatListeCiz();
  }else{
    const ad = chatRol==='diyetisyen' ? ((sohbetler[chatAktifUid]&&sohbetler[chatAktifUid].ad)||'Danışan') : 'Diyetisyenim';
    panel.innerHTML=`
      <div class="chat-head">
        ${chatRol==='diyetisyen'?`<button onclick="chatListeyeDon()" title="Geri"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m15 18-6-6 6-6"/></svg></button>`:''}
        <div class="ttl">${esc(ad)}</div>${notifBtnHTML()}<button onclick="chatToggle()" title="Kapat">×</button>
      </div>
      <div class="chat-msgs" id="chatMsgs"></div>
      <div class="chat-input">
        <input id="chatInput" placeholder="Mesaj yaz…" autocomplete="off" onkeydown="if(event.key==='Enter'){event.preventDefault();chatGonder()}">
        <button class="btn" onclick="chatGonder()">Gönder</button>
      </div>`;
    chatThreadCiz();
    const inp=$('chatInput'); if(inp) inp.focus();
  }
}
function chatListeCiz(){
  const box=$('chatList'); if(!box) return;
  const uids=Object.keys(sohbetler);
  if(!uids.length){ box.innerHTML=`<div class="chat-empty">Henüz danışanın yok.</div>`; return; }
  uids.sort((a,b)=>sonTs(b)-sonTs(a));
  box.innerHTML=uids.map(uid=>{
    const s=sohbetler[uid];
    const son=s.mesajlar[s.mesajlar.length-1];
    const u=okunmamis(uid);
    const onek = son? (son.gonderen===chatRol?'Sen: ':'') : '';
    return `<div class="conv ${u?'unread':''}" onclick="chatAc('${uid}')">
      <div class="avatar">${esc(initialler(s.ad))}</div>
      <div style="min-width:0;flex:1"><div class="nm">${esc(s.ad)}</div><div class="last">${son?esc(onek+son.metin):'Mesaj yok'}</div></div>
      ${u?`<div class="ub">${u}</div>`:''}
    </div>`;
  }).join('');
}
function sonTs(uid){ const s=sohbetler[uid]; const m=s&&s.mesajlar[s.mesajlar.length-1]; return m?(m.olusturulma||0):0; }
function chatThreadCiz(){
  const box=$('chatMsgs'); if(!box) return;
  const s=sohbetler[chatAktifUid];
  const msgs=(s&&s.mesajlar)||[];
  if(!msgs.length){ box.innerHTML=`<div class="chat-empty">Henüz mesaj yok. İlk mesajı yaz.</div>`; return; }
  box.innerHTML=msgs.map(m=>{
    const ben=m.gonderen===chatRol;
    const saat=m.olusturulma?new Date(m.olusturulma).toLocaleString('tr-TR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'';
    return `<div class="bubble ${ben?'ben':'karsi'}">${esc(m.metin)}<div class="meta">${saat}</div></div>`;
  }).join('');
  box.scrollTop=box.scrollHeight;
}
window.chatGonder=async function(){
  const inp=$('chatInput'); if(!inp||!chatAktifUid) return;
  const metin=inp.value.trim(); if(!metin) return;
  inp.value='';
  try{
    await addDoc(collection(db,'kullanicilar',chatAktifUid,'mesajlar'),
      { metin, gonderen:chatRol, gonderenUid:state.uid, olusturulma:Date.now() });
    const hedef = chatRol==='danisan' ? state.profil.olusturan : chatAktifUid;
    pushGonder(hedef, metin);
  }
  catch(e){ toast('Hata',authHata(e)); inp.value=metin; }
};
async function chatOkunduYap(uid){
  const s=sohbetler[uid]; if(!s) return;
  s.okundu=Date.now(); chatBadgeGuncelle();
  try{
    const alan = chatRol==='danisan' ? {okumaDanisan:s.okundu} : {okumaDiyetisyen:s.okundu};
    await updateDoc(doc(db,'kullanicilar',uid), alan);
  }catch(e){}
}

/* =====================================================================
   FCM PUSH — arka plan bildirimi (yalnızca https / Vercel)
   ===================================================================== */
let fcmMessaging=null;
async function pushBaslat(){
  try{
    if(!('serviceWorker' in navigator) || !('Notification' in window)) return;
    if(location.protocol==='file:') return;            // SW https ister
    if(!VAPID_KEY || VAPID_KEY==='BURAYA_VAPID_KEY') return; // anahtar girilmemiş
    const reg = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
    if(Notification.permission==='default'){ const p=await Notification.requestPermission(); if(p!=='granted') return; }
    if(Notification.permission!=='granted') return;
    const { getMessaging, getToken, onMessage } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js');
    fcmMessaging = getMessaging(app);
    const token = await getToken(fcmMessaging, { vapidKey:VAPID_KEY, serviceWorkerRegistration:reg });
    if(token){
      const id = token.slice(0,180).replace(/[^A-Za-z0-9_-]/g,'_');
      await setDoc(doc(db,'kullanicilar',state.uid,'pushTokens',id),
        { token, ts:Date.now(), ua:(navigator.userAgent||'').slice(0,200) }, {merge:true});
    }
    // ön planda (uygulama açıkken) gelen push: uygulama zaten toast gösterdiği için sessiz geç
    onMessage(fcmMessaging, ()=>{});
  }catch(e){ console.log('push init:', e&&e.message||e); }
}
async function pushGonder(hedefUid, metin){
  try{
    if(!hedefUid || !PUSH_API) return;
    if(!auth.currentUser) return;
    const idToken = await auth.currentUser.getIdToken();
    const ad = state.profil.adSoyad||state.profil.kullaniciAdi||'';
    await fetch(PUSH_API, { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ idToken, hedefUid, baslik:'Yeni mesaj · '+ad, govde:metin, link:'/' }) });
  }catch(e){ /* push başarısızsa sohbet yine çalışır */ }
}

/* =====================================================================
   ÖĞÜN BİLDİRİMLERİ  (danışan, sayfa açıkken)
   ===================================================================== */
let reminderTimer=null;
function startReminders(){
  stopReminders();
  reminderTimer=setInterval(reminderCheck, 30000);
  reminderCheck();
}
function stopReminders(){ if(reminderTimer){ clearInterval(reminderTimer); reminderTimer=null; } }
function reminderCheck(){
  if(!danisanProfil||!danisanProfil.diyet) return;
  // bugün görünümündeyse "yaklaşıyor" rozetlerini tazele
  if($('todayMeals')) cizBugun();
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  const gun=bugunGun();
  const list=(danisanProfil.diyet.gunler&&danisanProfil.diyet.gunler[gun])||[];
  const n=nowMin(); const iso=bugunISO();
  list.forEach((m,i)=>{
    const mm=saatToMin(m.saat); if(mm==null) return;
    const diff=mm-n;
    if(diff>=0 && diff<=BILDIRIM_DK){
      const key=`bldr_${iso}_${gun}_${i}_${m.saat}`;
      if(localStorage.getItem(key)) return;
      localStorage.setItem(key,'1');
      const baslik=`${m.ad||'Öğün'} zamanı yaklaşıyor`;
      const govde=`${m.saat} · ${(m.icerik||'').slice(0,80)}`;
      try{ new Notification(baslik,{body:govde,tag:key}); }catch(e){}
      toast(baslik, govde, 'meal');
    }
  });
}

</script>
</body>
</html>
